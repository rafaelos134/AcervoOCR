name: Gerar instalador do Windows

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  installer:
    runs-on: windows-latest
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Instalar ferramentas de compilação
        shell: powershell
        run: |
          choco install tesseract --yes --no-progress
          choco install innosetup --yes --no-progress
          irm https://astral.sh/uv/install.ps1 | iex
          "$env:USERPROFILE\.local\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "C:\Program Files\Tesseract-OCR" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Gerar o instalador
        shell: powershell
        run: .\build_windows.ps1

      - name: Disponibilizar o instalador
        uses: actions/upload-artifact@v4
        with:
          name: AcervoOCR-Instalador-Windows
          path: dist/installer/*.exe
          if-no-files-found: error

      - name: Anexar instalador à versão
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/installer/*.exe
